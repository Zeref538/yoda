name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Unit tests
        run: pytest -q
# Benchmark runs locally only (CI has no Ollama); a mocked-LLM test of the
# full loop lands in Phase 2 and runs here.
